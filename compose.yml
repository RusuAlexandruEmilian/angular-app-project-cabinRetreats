services:
  frontend:
    build: 
      context: ./cabin-retreats-app-client
      dockerfile: Dockerfile
    restart: always
    networks:
      -app-network
    
  backend:
    build: ./cabin-retreats-app-server
    restart: always
    env_file:
      - .env
    networks:
      -app-network

  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: always
    ports:
      - '80:80'
      - '443:443'
      - '81:81' 
    volumes:
      - ./proxy_data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

    
  
