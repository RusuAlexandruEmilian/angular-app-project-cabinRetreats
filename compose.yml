services:
  frontend:
    build: ./cabin-retreats-app-client
    ports: 
      - 4200:4200
    volumes: 
      - ./cabin-retreats-app-client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true 
    command: npx ng serve --host 0.0.0.0 --poll 1000 
    depends_on:
      - backend  

    
  backend:
    build: ./cabin-retreats-app-server
    env_file:
      - ./cabin-retreats-app-server/.env
    ports:
      - 3000:3000
    volumes: 
      - ./cabin-retreats-app-server:/app
      - /app/node_modules
    command: npx nodemon -L index.js 
    
  
